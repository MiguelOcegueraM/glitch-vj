name: Build Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: |
          bun build src/renderer/main.ts --outdir dist/renderer --target browser
          cp src/renderer/index.html dist/renderer/
          cp src/renderer/styles.css dist/renderer/
          cp -r src/renderer/shaders dist/renderer/
          bun build src/main/main.ts --outdir dist/main --target node --external electron --format cjs
          bun build src/preload/preload.ts --outdir dist/preload --target node --external electron --format cjs

      - name: Package for Windows
        run: npx electron-builder --win --x64

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: glitchvj-windows
          path: |
            release/*.exe
            release/*.msi
